<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ - اكسب معنا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wheel-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px 20px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        .prize-card {
            background: white;
            padding: 12px 8px;
            border-radius: 10px;
            border: 2px solid #764ba2;
            color: #764ba2;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .prize-card:hover {
            transform: translateY(-3px);
        }
        .prize-card.highlight {
            background: #764ba2;
            color: white;
        }
        .prize-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }
        
        /* العجلة */
        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 8px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.15, 1);
            cursor: pointer;
        }
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            left: 0;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            padding-right: 35px;
            box-sizing: border-box;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .spin-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,75,43,0.3);
            transition: all 0.3s;
            margin: 20px 0;
            width: 100%;
            max-width: 300px;
        }
        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(255,75,43,0.4);
        }
        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-area {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            display: none;
            animation: slideIn 0.5s ease;
        }
        .result-area.show {
            display: block;
        }
        .code-box {
            background: #1e1e1e;
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            letter-spacing: 4px;
            margin: 20px 0;
            direction: ltr;
            word-break: break-all;
            border: 2px solid #4caf50;
        }
        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #45a049;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .remaining-spins {
            background: #ffd700;
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="wheel-container">
        <h1>🎡 عجلة الحظ 🎡</h1>
        <p class="subtitle">اضغط على العجلة أو زر اللف للبدء</p>
        
        <div class="prizes-grid" id="prizesGrid">
            <div class="prize-card"><span class="prize-icon">📱</span> ايفون 15</div>
            <div class="prize-card"><span class="prize-icon">💰</span> 10,000 جنيه</div>
            <div class="prize-card"><span class="prize-icon">💵</span> 3,000 جنيه</div>
            <div class="prize-card"><span class="prize-icon">💵</span> 2,000 جنيه</div>
            <div class="prize-card"><span class="prize-icon">💵</span> 1,000 جنيه</div>
            <div class="prize-card"><span class="prize-icon">💵</span> 500 جنيه</div>
            <div class="prize-card"><span class="prize-icon">💵</span> 100 جنيه</div>
        </div>

        <div class="remaining-spins" id="remainingSpins">لديك 3 محاولات متبقية</div>

        <div class="wheel-wrapper">
            <div class="pointer">⬇️</div>
            <div class="wheel" id="wheel" onclick="spinWheel()">
                <!-- الأجزاء ستضاف بواسطة JavaScript -->
            </div>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🔄 لف العجلة</button>

        <div id="resultArea" class="result-area">
            <h2>🎉 ألف مبروك! 🎉</h2>
            <p id="prizeMessage" style="font-size: 20px; margin: 15px 0;"></p>
            <div id="codeDisplay" class="code-box">WIN-XXXX-XXXX</div>
            <button class="copy-btn" onclick="copyCode()">📋 نسخ الكود</button>
            <p style="margin-top: 15px; color: #666;">استخدم هذا الكود لاستلام جائزتك</p>
        </div>
    </div>

    <script>
        // قائمة الجوائز
        const prizes = [
            { name: "ايفون 15", icon: "📱", color: "#ff6b6b" },
            { name: "10,000 جنيه", icon: "💰", color: "#4ecdc4" },
            { name: "3,000 جنيه", icon: "💵", color: "#ffe66d" },
            { name: "2,000 جنيه", icon: "💵", color: "#ff9f1c" },
            { name: "1,000 جنيه", icon: "💵", color: "#bf7ef2" },
            { name: "500 جنيه", icon: "💵", color: "#e0aaff" },
            { name: "100 جنيه", icon: "💵", color: "#ff8c8c" }
        ];

        let currentRotation = 0;
        let spinsLeft = 3;
        let canSpin = true;

        // إنشاء أجزاء العجلة
        function createWheelSegments() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            const segmentAngle = 360 / prizes.length;
            
            prizes.forEach((prize, index) => {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                segment.style.background = prize.color;
                segment.style.transform = `rotate(${index * segmentAngle}deg) skewY(${90 - segmentAngle}deg)`;
                segment.style.left = '50%';
                segment.style.top = '50%';
                segment.style.marginLeft = '-1px';
                segment.style.marginTop = '-1px';
                segment.innerHTML = `<span style="transform: rotate(${segmentAngle/2}deg) translateY(-20px); display: block;">${prize.icon} ${prize.name}</span>`;
                wheel.appendChild(segment);
            });
        }

        // دالة لف العجلة
        function spinWheel() {
            if (!canSpin || spinsLeft <= 0) {
                if (spinsLeft <= 0) {
                    alert('لقد استنفذت محاولاتك لهذا اليوم!');
                }
                return;
            }

            canSpin = false;
            spinsLeft--;
            document.getElementById('remainingSpins').innerText = `لديك ${spinsLeft} محاولات متبقية`;
            
            // تعطيل الزر أثناء اللف
            document.getElementById('spinBtn').disabled = true;
            
            // حساب دوران عشوائي (بين 5 و 10 دورات كاملة + زاوية عشوائية)
            const spins = 5 + Math.floor(Math.random() * 5);
            const extraAngle = Math.floor(Math.random() * 360);
            const newRotation = currentRotation + (spins * 360) + extraAngle;
            
            // تطبيق الدوران
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${newRotation}deg)`;
            
            // حساب الجائزة بعد انتهاء الدوران
            setTimeout(() => {
                currentRotation = newRotation % 360;
                
                // تحديد الجائزة بناءً على الزاوية النهائية
                const segmentAngle = 360 / prizes.length;
                const normalizedAngle = (360 - (currentRotation % 360)) % 360;
                const prizeIndex = Math.floor(normalizedAngle / segmentAngle);
                
                // عرض النتيجة
                showResult(prizeIndex);
                
                canSpin = true;
            }, 3000);
        }

        // دالة عرض النتيجة
        function showResult(prizeIndex) {
            const prize = prizes[prizeIndex];
            const resultArea = document.getElementById('resultArea');
            const prizeMessage = document.getElementById('prizeMessage');
            const codeDisplay = document.getElementById('codeDisplay');
            
            // إنشاء كود عشوائي
            const randomCode = 'WIN-' + 
                Math.random().toString(36).substring(2, 6).toUpperCase() + '-' +
                Math.random().toString(36).substring(2, 6).toUpperCase() + '-' +
                Math.floor(1000 + Math.random() * 9000);
            
            prizeMessage.innerHTML = `لقد ربحت: <strong style="font-size: 24px;">${prize.icon} ${prize.name}</strong>`;
            codeDisplay.innerText = randomCode;
            resultArea.classList.add('show');
            
            // تفعيل زر اللف إذا كانت لا تزال هناك محاولات
            if (spinsLeft > 0) {
                document.getElementById('spinBtn').disabled = false;
            }
        }

        // دالة نسخ الكود
        function copyCode() {
            const code = document.getElementById('codeDisplay').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert('تم نسخ الكود بنجاح!');
            }).catch(() => {
                alert('فشل النسخ، يمكنك نسخ الكود يدوياً');
            });
        }

        // تهيئة الصفحة
        window.onload = function() {
            createWheelSegments();
            document.getElementById('remainingSpins').innerText = `لديك ${spinsLeft} محاولات متبقية`;
        };
    </script>
</body>
</html>
